<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>任務倒數計時器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;padding:1rem;}
.big-wrap{background:#fff;border:0.5px solid #ddd;border-radius:0 0 16px 16px;padding:1.2rem 1.5rem;margin-bottom:1rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.big-top{display:flex;align-items:center;gap:1rem;}
.big-dot-lg{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.big-info{flex:1;min-width:0;}
.big-label{font-size:12px;color:#aaa;margin-bottom:2px;}
.big-name{font-size:17px;font-weight:500;color:#1a1a1a;}
.big-sub{font-size:12px;color:#888;margin-top:2px;}
.big-time{font-size:44px;font-weight:600;font-variant-numeric:tabular-nums;color:#1a1a1a;flex-shrink:0;letter-spacing:1px;}
.big-time.urgent{color:#E24B4A;}
.big-bar-wrap{height:4px;background:#eee;border-radius:2px;overflow:hidden;margin-top:.75rem;}
.big-bar{height:100%;background:#378ADD;border-radius:2px;transition:width .5s linear;}
.big-dots{display:flex;gap:5px;flex-wrap:wrap;margin-top:.5rem;}
.bdot{width:8px;height:8px;border-radius:50%;background:#ddd;cursor:pointer;transition:all .2s;}
.bdot.act{width:20px;border-radius:4px;}
h1{font-size:15px;font-weight:500;color:#444;margin-bottom:.5rem;}
.global-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center;}
.summary{font-size:12px;color:#888;margin-left:auto;}
.sbar{font-size:11px;color:#888;margin-bottom:8px;min-height:16px;}
.legend{display:flex;flex-wrap:wrap;gap:6px 14px;margin-bottom:10px;font-size:11px;color:#888;}
.li{display:flex;align-items:center;gap:4px;}
.ldot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.fr{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.fb{font-size:11px;padding:3px 10px;border-radius:20px;border:0.5px solid #ccc;background:transparent;color:#555;cursor:pointer;}
.fb.act{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.tc{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:10px 12px;margin-bottom:6px;}
.tc.pri{background:#fffbf0;border:1.5px solid #EF9F27;}
.tc.run{border-color:#999;}
.tc.dn{opacity:0.4;}
.tc.eli{background:#f8f8f8;}
.tc.dov{border-top:2.5px solid #378ADD;}
.tc.drg{opacity:.45;}
.mr{display:flex;align-items:center;gap:8px;}
.dh{color:#bbb;font-size:15px;cursor:grab;flex-shrink:0;padding:0 2px;}
.ri{width:36px;font-size:12px;padding:3px 4px;border-radius:6px;border:0.5px solid #ccc;background:#fafafa;color:#444;text-align:center;flex-shrink:0;}
.ri:focus{outline:none;border-color:#378ADD;}
.cb{width:4px;border-radius:2px;align-self:stretch;flex-shrink:0;min-height:34px;}
.ti{flex:1;min-width:0;}
.tn{font-size:13px;font-weight:500;color:#1a1a1a;line-height:1.4;}
.tn.eli{text-decoration:line-through;color:#aaa;}
.tm{font-size:11px;color:#888;margin-top:2px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.bg{display:flex;gap:4px;align-items:center;flex-shrink:0;flex-wrap:wrap;}
.tg{font-size:10px;padding:2px 6px;border-radius:10px;white-space:nowrap;}
.tg-red{background:#FCEBEB;color:#791F1F;}
.tg-amber{background:#FAEEDA;color:#633806;}
.tg-blue{background:#E6F1FB;color:#0C447C;}
.tg-green{background:#EAF3DE;color:#27500A;}
.tg-pri{background:#EF9F27;color:#fff;font-weight:600;font-size:10px;padding:2px 7px;border-radius:10px;}
.tg-eli{background:#fee2e2;color:#991b1b;font-weight:600;font-size:10px;padding:2px 7px;border-radius:10px;}
.cg-pray{background:#EDE9FE;color:#4C1D95;}
.cg-church{background:#FDE8FF;color:#6B21A8;}
.cg-council{background:#FEF3C7;color:#92400E;}
.cg-tech{background:#DBEAFE;color:#1E3A8A;}
.cg-family{background:#FFE4E6;color:#881337;}
.cg-admin{background:#F1F5F9;color:#334155;}
.td{font-size:17px;font-weight:500;font-variant-numeric:tabular-nums;min-width:56px;text-align:right;color:#1a1a1a;flex-shrink:0;}
.td.urg{color:#E24B4A;}
.td.eli{color:#ccc;}
.br{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;}
button{font-size:11px;padding:3px 8px;border-radius:6px;border:0.5px solid #ccc;background:transparent;color:#555;cursor:pointer;line-height:1.4;}
button:hover{background:#f0eeea;}
.bs{color:#185FA5;border-color:#85B7EB;}
.bp{color:#BA7517;border-color:#EF9F27;}
.bd{color:#A32D2D;border-color:#F09595;}
.be{color:#991b1b;border-color:#fca5a5;}
.bu{color:#3B6D11;border-color:#97C459;}
.er{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:0.5px solid #eee;flex-wrap:wrap;}
.er label{font-size:11px;color:#888;white-space:nowrap;}
.note-input{font-size:11px;padding:2px 6px;border-radius:6px;border:0.5px solid #e0e0e0;background:#fafafa;color:#666;width:100%;margin-top:3px;outline:none;}
.note-input:focus{border-color:#378ADD;}
.note-input::placeholder{color:#ccc;}
.er input[type=range]{flex:1;min-width:80px;}
.er input[type=number]{width:58px;font-size:12px;padding:3px 6px;border-radius:6px;border:0.5px solid #ccc;background:#fafafa;color:#1a1a1a;text-align:center;}
.cfm{background:#fff3cd;border:0.5px solid #EF9F27;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:#633806;display:flex;align-items:center;gap:10px;}
.cfm span{flex:1;}
</style>
</head>
<body>
<div class="big-wrap">
  <div class="big-top">
    <div class="big-dot-lg" id="bigDot"></div>

      <div class="big-label">目前聚焦分類（每5分鐘切換，可點下方圓點跳轉）</div>

<h1>任務倒數計時器</h1>
<div class="legend">
  <div class="li"><span class="ldot" style="background:#E24B4A;"></span>重點</div>

<div class="fr">
  <button class="fb act" onclick="sf('all',this)">全部</button>
  <button class="fb" onclick="sf('pray',this)">🙏 禱告靈修</button>

</div>
<div class="global-row">
  <button onclick="startAll()">全部開始</button>
  <button onclick="pauseAll()">全部暫停</button>
  <button onclick="resetAll()">全部重置</button>
  <button onclick="applyRanks()">套用排名</button>

<div id="cfmArea"></div>

<script>
const SK='david-tasks-stable';
const CM={
  pray:{label:'🙏 禱告靈修',color:'#7C3AED',cls:'cg-pray'},
  church:{label:'⛪ 教會事工',color:'#9333EA',cls:'cg-church'},
  council:{label:'🏛️ 議員辦公室',color:'#D97706',cls:'cg-council'},
  tech:{label:'💻 程式技術',color:'#2563EB',cls:'cg-tech'},
  family:{label:'👨‍👩‍👧‍👦 家庭生活',color:'#E11D48',cls:'cg-family'},
};
const CK=Object.keys(CM);
const CC={red:'#E24B4A',amber:'#EF9F27',blue:'#378ADD',green:'#639922'};
const CL={red:'重點',amber:'重要',blue:'一般',green:'備忘'};
const SW=300;

const DF=[
  {name:"安排週末時間，安排出來一定要跟太太討論",mins:20,cat:"amber",priority:true,grp:"family",origNum:1},
  {name:"啟發邀請：士斌、資訊室人員、冠禎哥（重點中的重點）",mins:45,cat:"red",priority:true,grp:"church",origNum:2},
  {name:"啟發結帳，請款：啟發重點，誰是進入牧養平台者？啟發志工的邀請 麗文",mins:30,cat:"red",priority:true,grp:"church",origNum:3},
  {name:"拜託 Lisa 把助理電子化",mins:15,cat:"amber",priority:false,grp:"council",origNum:4},
  {name:"捷運上正進行：融資餘額要抓、環狀定位時間、爬蟲台積電三大法人抓證交所、自動評分寫入、分析報告加 sxx 和權重條件",mins:120,cat:"red",priority:false,grp:"tech",origNum:5},
  {name:"追露出：中視要上傳截圖",mins:15,cat:"amber",priority:false,grp:"council",origNum:6},
  {name:"請 Lisa 輸入接觸人數的數字，跑程式之前要先確認，孟諺我幫他多輸入了，藍底的",mins:15,cat:"amber",priority:false,grp:"church",origNum:7},
  {name:"通知車主",mins:5,cat:"green",priority:false,grp:"council",origNum:8},
  {name:"週一召集 RPG 禱告會，週四找張主任和士斌哥 RPG，二四銓興哥、冠禎哥，為吉昇禱告",mins:10,cat:"green",priority:false,grp:"pray",origNum:9},
  {name:"啟發代禱信",mins:45,cat:"red",priority:true,grp:"pray",origNum:10},
  {name:"寫 RPG 筆記：為了祈禱午餐會和楷譯，孝宜牧師會特別安排見證，預備許多的滿福寶",mins:30,cat:"amber",priority:false,grp:"pray",origNum:11},
  {name:"領袖班的作業：把握方向，清楚每一次聚會的中心思想與目標，避免天南地北地閒聊",mins:60,cat:"amber",priority:false,grp:"church",origNum:12},
  {name:"聯繫正威＋週三會議執行＋跨權會工作日誌",mins:30,cat:"amber",priority:false,grp:"council",origNum:13},
  {name:"呼召：職場主日 06/07，BSH、晨禱、啟發、RPG",mins:20,cat:"amber",priority:false,grp:"pray",origNum:14},
  {name:"打開議員信箱",mins:10,cat:"blue",priority:false,grp:"council",origNum:15},
  {name:"啟發：聚會中感恩時間會偏長，好詩歌：更多認識你，RPG 影片聲音太小，拜託麗文姐擦桌子",mins:15,cat:"amber",priority:false,grp:"church",origNum:16},
  {name:"把 Outlook 的任務救出來",mins:20,cat:"amber",priority:false,grp:"tech",origNum:17},
  {name:"儀表板更新，把新聞的分析模組做出來",mins:60,cat:"red",priority:false,grp:"tech",origNum:18},
  {name:"新的新聞報表要把 YouTube 也放進去，參數要可以選擇哪些關鍵字需要納入馨文的分析",mins:45,cat:"red",priority:false,grp:"tech",origNum:19},
  {name:"儀表板更新：技術多空變化 30 天、新聞多空變化 30 天，技術準確率呈現",mins:60,cat:"red",priority:false,grp:"tech",origNum:20},
  {name:"儀表板更新：不準確的數據就跳灰色",mins:30,cat:"amber",priority:false,grp:"tech",origNum:21},
  {name:"回測模組：把上一代的回測方法加入最新的回測模組",mins:60,cat:"red",priority:false,grp:"tech",origNum:22},
  {name:"要問同工覺得還可以邀請誰",mins:10,cat:"blue",priority:false,grp:"church",origNum:23},
  {name:"開發連結，稍遠的 BEST 模式：楷譯 翔逸",mins:15,cat:"amber",priority:false,grp:"church",origNum:24},
  {name:"工作包含下載啟發影片、擺盤",mins:15,cat:"amber",priority:false,grp:"church",origNum:25},
  {name:"修改回測模組，特別的假日不要跑",mins:30,cat:"amber",priority:false,grp:"tech",origNum:26},
  {name:"浩田：禱告、啟發、程式開發",mins:15,cat:"amber",priority:false,grp:"pray",origNum:27},
  {name:"下週每一組要報告進展，人力和進度要清楚",mins:15,cat:"amber",priority:false,grp:"church",origNum:28},
  {name:"問弘遠：資源回收種類，另外一台不秤重？工業垃圾",mins:15,cat:"blue",priority:false,grp:"council",origNum:29},
  {name:"分析 57爆新聞的關鍵字然後進入報表",mins:30,cat:"amber",priority:false,grp:"tech",origNum:30},
  {name:"修改時間參數來抓",mins:20,cat:"amber",priority:false,grp:"tech",origNum:31},
  {name:"整理出禱告儀表板",mins:30,cat:"amber",priority:false,grp:"pray",origNum:32},
  {name:"新聞多空分析要改到 GitHub",mins:20,cat:"amber",priority:false,grp:"tech",origNum:33},
  {name:"自由時報的露出，時間要修正",mins:15,cat:"amber",priority:false,grp:"council",origNum:34},
  {name:"買煮蛋器",mins:5,cat:"green",priority:false,grp:"family",origNum:35},
  {name:"全聯帶，哥哥剪頭髮 3/15",mins:10,cat:"green",priority:false,grp:"family",origNum:36},
  {name:"幫嘟嘟剪頭髮 4/14",mins:10,cat:"green",priority:false,grp:"family",origNum:37},
  {name:"孩子任務要每週調整",mins:10,cat:"green",priority:false,grp:"family",origNum:38},
  {name:"聚會完要分享詩歌連結，聚會的時候沒時間吃飯怎麼解決",mins:10,cat:"green",priority:false,grp:"pray",origNum:39},
];

const API='https://script.google.com/macros/s/AKfycby76QenFGRUIJeA7wj-rX2MkmVLYRmEG7euRsIeCgDlHuFgnfkbadvAanJFSFwX2Z0T0Q/exec';
const CSV='https://docs.google.com/spreadsheets/d/10yGuvuAUTDg_MlpqhsjwoCZeEKaHE6D2FUwAakfatbc/export?format=csv&gid=0';
let tasks=[],timers={},filt='all',dsUid=null,uc=0,bIdx=0,bSec=SW,bIv=null,bPaused=false,saveTimer=null,noteTimer=null;
function uid(){return ++uc;}
function fmt(s){const m=Math.floor(Math.max(s,0)/60),sc=Math.max(s,0)%60;return String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0');}
function ss(m){const e=document.getElementById('status');if(e)e.textContent=m;}
function dataPayload(){
  return JSON.stringify(tasks.map(t=>({uid:t.uid,name:t.name,mins:t.mins,cat:t.cat,left:t.left,priority:t.priority,rank:t.rank||'',grp:t.grp||'',eliminated:!!t.eliminated,origNum:t.origNum||null,note:t.note||''})));
}
function save(){
  const d=dataPayload();
  // always write localStorage as fallback
  try{localStorage.setItem(SK,d);}catch(e){}
  // debounce cloud write: wait 1.5s after last change
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    fetch(API,{method:'POST',body:d,mode:'no-cors'})
      .then(()=>ss('已同步至雲端 ✓'))
      .catch(()=>ss('雲端同步失敗，已存本機。'));
  },1500);
}
function parseTasks(raw){
  const p=JSON.parse(raw);
  const hg=p.length>0&&p[0].grp&&p[0].grp!=='';
  return p.map((t,i)=>{
    const dfMatch=DF.find(d=>d.name===t.name);
    const grp=(hg&&t.grp)?t.grp:(dfMatch||{grp:''}).grp;
    const origNum=t.origNum||(dfMatch?dfMatch.origNum:null)||null;
    const u=t.uid||uid(); if(u>uc)uc=u;
    return{...t,uid:u,state:'idle',editOpen:false,
      rank:t.rank!==undefined&&t.rank!==''?String(t.rank):String(origNum||i+1),
      grp,eliminated:!!t.eliminated,origNum,note:t.note||''};
  });
}
function init(){
  ss('載入中…');
  fetch(API)
    .then(r=>{if(!r.ok)throw new Error('fail');return r.text();})
    .then(raw=>{
      raw=raw.trim();
      if(raw&&raw!=='[]'&&raw.startsWith('[')){
        tasks=parseTasks(raw);
        try{localStorage.setItem(SK,raw);}catch(e){}
        ss('已從雲端載入。');
      } else {
        loadLocal();
      }
    })
    .catch(()=>{
      ss('雲端無法連線，從本機載入…');
      loadLocal();
    })
    .finally(()=>{
      bIv=setInterval(bigTick,1000);bigRender();render();
    });
}
function loadLocal(){
  try{
    const raw=localStorage.getItem(SK);
    if(raw){
      tasks=parseTasks(raw);
      ss('已從本機快取載入。（離線模式）');
    }else{
      tasks=DF.map((t,i)=>({...t,uid:uid(),left:t.mins*60,state:'idle',editOpen:false,rank:String(t.origNum||i+1),eliminated:false,origNum:t.origNum||null,note:''}));
      save();ss('首次載入預設清單。');
    }
  }catch(e){
    tasks=DF.map((t,i)=>({...t,uid:uid(),left:t.mins*60,state:'idle',editOpen:false,rank:String(t.origNum||i+1),eliminated:false,origNum:t.origNum||null,note:''}));
    ss('無法存取儲存空間。');
  }
}
function bigTick(){
  if(bPaused)return;
  bSec--;if(bSec<=0){bIdx=(bIdx+1)%CK.length;bSec=SW;}
  bigRender();
}
function bigRender(){
  const k=CK[bIdx],m=CM[k];
  const ct=tasks.filter(t=>!t.eliminated&&t.grp===k);
  const dn=ct.filter(t=>t.left===0||t.state==='done').length;
  const rn=ct.filter(t=>t.state==='running').length;
  document.getElementById('bigDot').style.background=m.color;
  document.getElementById('bigName').textContent=m.label;
  document.getElementById('bigSub').textContent=ct.length>0?`${dn}/${ct.length} 完成${rn>0?'，'+rn+' 進行中':''}`:' 無任務';
  const te=document.getElementById('bigTime');
  te.textContent=fmt(bSec);te.className='big-time'+(bSec<60?' urgent':'');
  document.getElementById('bigBar').style.width=Math.round((1-bSec/SW)*100)+'%';
  document.getElementById('bigDots').innerHTML=CK.map((k2,i)=>`<div class="bdot${i===bIdx?' act':''}" style="background:${i===bIdx?CM[k2].color:'#ddd'};" onclick="jc(${i})" title="${CM[k2].label}"></div>`).join('');
  // 同步篩選列：大計時器切換時，篩選列跟著切到同一分類
  const curGrp=CK[bIdx];
  if(filt!==curGrp){
    filt=curGrp;
    document.querySelectorAll('.fb').forEach(b=>{
      const isMatch=b.getAttribute('onclick')&&b.getAttribute('onclick').includes("'"+curGrp+"'");
      b.classList.toggle('act',isMatch);
    });
    render();
  }
}
function jc(i){bIdx=i;bSec=SW;bigRender();}
function toggleBigPause(){
  bPaused=!bPaused;
  const btn=document.getElementById('bigPauseBtn');
  if(btn)btn.textContent=bPaused?'▶ 繼續切換':'⏸ 暫停切換';
}
function sf(f,btn){filt=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('act'));btn.classList.add('act');render();}
function applyRanks(){
  const ra=tasks.filter(t=>t.rank!==''&&!isNaN(parseInt(t.rank)));
  const un=tasks.filter(t=>t.rank===''||isNaN(parseInt(t.rank)));
  ra.sort((a,b)=>parseInt(a.rank)-parseInt(b.rank));
  tasks=[...ra,...un];save();render();ss('排名已套用。');
}
function sRank(u,v){const t=tasks.find(x=>x.uid===u);if(t)t.rank=v.trim();}
function setNote(u,v){const t=tasks.find(x=>x.uid===u);if(t){t.note=v;if(noteTimer)clearTimeout(noteTimer);noteTimer=setTimeout(()=>save(),1000);}}
function togElim(u){
  const t=tasks.find(x=>x.uid===u);if(!t)return;
  if(!t.eliminated){if(timers[u]){clearInterval(timers[u]);delete timers[u];}t.state='idle';}
  t.eliminated=!t.eliminated;save();render();
}
function render(){
  // Don't re-render if a note input is focused (would disrupt typing)
  const focused=document.activeElement;
  if(focused&&focused.classList.contains('note-input'))return;
  const list=document.getElementById('list');list.innerHTML='';
  const vis=tasks.filter(t=>{
    if(filt==='eliminated')return t.eliminated;
    if(filt==='all')return !t.eliminated;
    return !t.eliminated&&t.grp===filt;
  });
  vis.forEach(t=>{
    const u=t.uid,card=document.createElement('div');
    let cls='tc';
    if(t.priority&&!t.eliminated)cls+=' pri';
    if(t.state==='running')cls+=' run';
    if(t.left===0&&!t.eliminated)cls+=' dn';
    if(t.eliminated)cls+=' eli';
    card.className=cls;card.id='cu'+u;card.draggable=true;
    card.addEventListener('dragstart',e=>{dsUid=u;card.classList.add('drg');e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',()=>{card.classList.remove('drg');document.querySelectorAll('.tc').forEach(c=>c.classList.remove('dov'));});
    card.addEventListener('dragover',e=>{e.preventDefault();document.querySelectorAll('.tc').forEach(c=>c.classList.remove('dov'));card.classList.add('dov');});
    card.addEventListener('dragleave',()=>card.classList.remove('dov'));
    card.addEventListener('drop',e=>{
      e.preventDefault();document.querySelectorAll('.tc').forEach(c=>c.classList.remove('dov'));
      if(!dsUid||dsUid===u){dsUid=null;return;}
      const si=tasks.findIndex(x=>x.uid===dsUid),di=tasks.findIndex(x=>x.uid===u);
      if(si<0||di<0){dsUid=null;return;}
      const mv=tasks.splice(si,1)[0];tasks.splice(si<di?di-1:di,0,mv);
      dsUid=null;save();render();
    });
    const urg=t.left<60&&t.left>0&&t.state==='running';
    const sl=t.left<t.mins*60&&t.left>0?'繼續':'開始';
    const gl=CM[t.grp]?CM[t.grp].label:'',gc=CM[t.grp]?CM[t.grp].cls:'';
    card.innerHTML=`
      <div class="mr">
        <span class="dh">⠿</span>
        <input class="ri" type="text" value="${t.rank||''}" placeholder="#" oninput="sRank(${u},this.value)" onclick="event.stopPropagation()" ondragstart="event.stopPropagation()">
        <div class="cb" style="background:${t.eliminated?'#ccc':CC[t.cat]};"></div>
        <div class="ti">
          <div class="tn${t.eliminated?' eli':''}">${t.name}</div>
          <div class="tm"><span>預估 ${t.mins} 分鐘</span>${gl?`<span class="tg ${gc}">${gl}</span>`:''}</div>
          <input class="note-input" type="text" maxlength="20" placeholder="備註…" value="${t.note||''}"
            oninput="setNote(${u},this.value)" onclick="event.stopPropagation()" ondragstart="event.stopPropagation()">
        </div>
        <div class="bg">
          ${t.eliminated?'<span class="tg-eli">剔除</span>':t.priority?'<span class="tg-pri">優先</span>':''}
          ${!t.eliminated?`<span class="tg tg-${t.cat}">${CL[t.cat]}</span>`:''}
        </div>
        <div class="td${urg?' urg':''}${t.eliminated?' eli':''}" id="dd${u}">${fmt(t.left)}</div>
        <div class="br" id="bb${u}">
          ${!t.eliminated?(t.state!=='running'?`<button class="bs" onclick="so(${u})">${sl}</button>`:`<button class="bp" onclick="po(${u})">暫停</button>`):''}
          ${!t.eliminated?`<button onclick="ro(${u})">重置</button>`:''}
          ${!t.eliminated?`<button onclick="te2(${u})">⏱ 調時</button>`:''}
          ${t.eliminated?`<button class="bu" onclick="togElim(${u})">取消剔除</button>`:`<button class="be" onclick="togElim(${u})">剔除</button>`}
          <button class="bd" onclick="dt(${u})">刪除</button>
        </div>
      </div>
      ${t.editOpen&&!t.eliminated?`<div class="er">
        <label>分鐘：</label>
        <input type="number" id="nn${u}" value="${t.mins}" min="1" max="480" step="1" oninput="sr2(${u})">
        <input type="range" id="rr${u}" min="1" max="240" step="1" value="${Math.min(t.mins,240)}" oninput="sn2(${u})">
        <button onclick="at(${u})">套用</button>
      </div>`:''}`;
    list.appendChild(card);
  });
  const eli=tasks.filter(t=>t.eliminated).length;
  const pri=tasks.filter(t=>t.priority&&!t.eliminated).length;
  document.getElementById('summary').textContent=`顯示 ${vis.length} / 共 ${tasks.filter(t=>!t.eliminated).length} 項，優先 ${pri}，剔除 ${eli}`;
}
function askRestore(){document.getElementById('cfmArea').innerHTML=`<div class="cfm"><span>確定還原全部預設清單？你刪除的項目會全部回來。</span><button class="bu" onclick="doRes()">確定還原</button><button onclick="document.getElementById('cfmArea').innerHTML=''">取消</button></div>`;}
function doRes(){Object.values(timers).forEach(clearInterval);timers={};tasks=DF.map((t,i)=>({...t,uid:uid(),left:t.mins*60,state:'idle',editOpen:false,rank:String(i+1),eliminated:false,note:''}));save();document.getElementById('cfmArea').innerHTML='';ss('已還原。');render();}
function sr2(u){const n=document.getElementById('nn'+u),r=document.getElementById('rr'+u);if(n&&r)r.value=n.value;}
function sn2(u){const n=document.getElementById('nn'+u),r=document.getElementById('rr'+u);if(n&&r)n.value=r.value;}
function te2(u){const t=tasks.find(x=>x.uid===u);if(t){t.editOpen=!t.editOpen;render();}}
function at(u){
  const t=tasks.find(x=>x.uid===u);if(!t)return;
  const v=parseInt(document.getElementById('nn'+u).value)||t.mins;
  if(timers[u]){clearInterval(timers[u]);delete timers[u];}
  t.mins=v;t.left=v*60;t.state='idle';t.editOpen=false;save();render();
}
function tick(u){
  const t=tasks.find(x=>x.uid===u);
  if(!t){clearInterval(timers[u]);delete timers[u];return;}
  if(t.left<=0){clearInterval(timers[u]);delete timers[u];t.state='done';save();ud(u);return;}
  t.left--;ud(u);if(t.left%15===0)save();
}
function ud(u){
  const d=document.getElementById('dd'+u);if(!d)return;
  const t=tasks.find(x=>x.uid===u);if(!t)return;
  d.textContent=fmt(t.left);
  d.className='td'+(t.left<60&&t.left>0&&t.state==='running'?' urg':'')+(t.eliminated?' eli':'');
  const c=document.getElementById('cu'+u);
  if(c){let cl='tc';if(t.priority&&!t.eliminated)cl+=' pri';if(t.state==='running')cl+=' run';if(t.left===0&&!t.eliminated)cl+=' dn';if(t.eliminated)cl+=' eli';c.className=cl;}
}
function mkB(u,run){
  const t=tasks.find(x=>x.uid===u);
  const sl=t&&t.left<t.mins*60&&t.left>0?'繼續':'開始';
  return(run?`<button class="bp" onclick="po(${u})">暫停</button>`:`<button class="bs" onclick="so(${u})">${sl}</button>`)
    +`<button onclick="ro(${u})">重置</button><button onclick="te2(${u})">⏱ 調時</button><button class="be" onclick="togElim(${u})">剔除</button><button class="bd" onclick="dt(${u})">刪除</button>`;
}
function so(u){
  const t=tasks.find(x=>x.uid===u);if(!t||t.state==='running'||t.eliminated)return;
  if(t.left<=0)t.left=t.mins*60;t.state='running';
  if(timers[u])clearInterval(timers[u]);
  timers[u]=setInterval(()=>tick(u),1000);
  const b=document.getElementById('bb'+u);if(b)b.innerHTML=mkB(u,true);
  const c=document.getElementById('cu'+u);if(c)c.classList.add('run');
}
function po(u){
  const t=tasks.find(x=>x.uid===u);if(!t)return;
  if(timers[u]){clearInterval(timers[u]);delete timers[u];}
  t.state='paused';save();
  const b=document.getElementById('bb'+u);if(b)b.innerHTML=mkB(u,false);
  const c=document.getElementById('cu'+u);if(c)c.classList.remove('run');
}
function ro(u){
  const t=tasks.find(x=>x.uid===u);if(!t)return;
  if(timers[u]){clearInterval(timers[u]);delete timers[u];}
  t.left=t.mins*60;t.state='idle';t.editOpen=false;save();render();
}
function dt(u){
  const t=tasks.find(x=>x.uid===u);if(!t)return;
  if(timers[u]){clearInterval(timers[u]);delete timers[u];}
  tasks=tasks.filter(x=>x.uid!==u);save();ss('已刪除，重新整理不會復原。');render();
}
function startAll(){tasks.filter(t=>!t.eliminated).forEach(t=>so(t.uid));}
function pauseAll(){tasks.filter(t=>t.state==='running').forEach(t=>po(t.uid));}
function resetAll(){tasks.filter(t=>!t.eliminated).forEach(t=>ro(t.uid));}
init();
</script>
