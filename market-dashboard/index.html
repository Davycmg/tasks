<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>市場評分儀表板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0d0f14;
  --bg2:       #13161e;
  --bg3:       #1a1e2a;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.12);
  --text:      #e2e6f0;
  --text2:     #8b91a8;
  --text3:     #4a5068;
  --bull:      #34d399;
  --bull-bg:   rgba(52,211,153,0.12);
  --bear:      #f87171;
  --bear-bg:   rgba(248,113,113,0.12);
  --neut:      #94a3b8;
  --blue:      #60a5fa;
  --blue-bg:   rgba(96,165,250,0.1);
  --purple:    #a78bfa;
  --purple-bg: rgba(167,139,250,0.1);
  --accent:    #3b82f6;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px;
  min-height: 100vh;
  padding: 20px 16px 40px;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border2);
}
.header-left h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--text);
}
.header-left .subtitle {
  font-size: 11px;
  color: var(--text3);
  margin-top: 3px;
  font-family: 'JetBrains Mono', monospace;
}
.header-right {
  text-align: right;
}
#status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
}
#status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text3);
  transition: background 0.3s;
}
#status-dot.loading { background: #fbbf24; animation: pulse 1s infinite; }
#status-dot.ok      { background: var(--bull); }
#status-dot.err     { background: var(--bear); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

#updated-time {
  font-size: 10px;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  margin-top: 4px;
}

/* ── Loading / Error ── */
#loading-msg {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.05em;
}

/* ── Table wrapper ── */
.table-wrap {
  overflow-x: auto;
  border: 1px solid var(--border2);
  border-radius: 10px;
  background: var(--bg2);
}

table {
  border-collapse: collapse;
  width: 100%;
  min-width: 960px;
  table-layout: fixed;
}

/* ── Header rows ── */
thead tr.gh th {
  background: var(--bg3);
  font-size: 10px;
  font-weight: 500;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
  padding: 9px 4px 7px;
  border-bottom: 1px solid var(--border);
  color: var(--text2);
}
thead tr.sh th {
  background: var(--bg3);
  font-size: 9px;
  font-weight: 400;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text3);
  padding: 3px 4px 7px;
  border-bottom: 1px solid var(--border2);
  letter-spacing: 0.03em;
}

/* ── Body rows ── */
tbody tr.data-row {
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.12s;
}
tbody tr.data-row:hover { background: var(--bg3); }
tbody tr.data-row:last-child { border-bottom: none; }

td {
  text-align: center;
  vertical-align: middle;
  height: 32px;
  padding: 0 2px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}
td.date-cell {
  text-align: left;
  padding-left: 14px;
  font-size: 10px;
  color: var(--text2);
  letter-spacing: 0.03em;
  width: 86px;
}
td.score-cell { font-size: 11px; font-weight: 500; }
td.price-cell { font-size: 11px; }

/* ── Score colors ── */
.v-bull { color: var(--bull); }
.v-bear { color: var(--bear); }
.v-neut { color: var(--text3); }
.v-null { color: var(--text3); opacity: 0.4; }

/* ── Borders ── */
.bl { border-left: 1px solid var(--border2) !important; }
.br { border-right: 1px solid var(--border2) !important; }
.bl-s { border-left: 1px solid var(--border) !important; }

/* ── News tag ── */
.tag {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 10px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 8px;
  text-decoration: none;
  font-family: 'Noto Sans TC', sans-serif;
  transition: opacity 0.15s;
  white-space: nowrap;
}
.tag:hover { opacity: 0.75; }
.tag-bull { background: var(--bull-bg); color: var(--bull); }
.tag-bear { background: var(--bear-bg); color: var(--bear); }
.tag-neut { background: var(--bg3); color: var(--neut); }

/* ── Detail row ── */
tr.detail-row { display: none; }
tr.detail-row.open { display: table-row; }
tr.detail-row td {
  background: #111420;
  padding: 12px 16px;
  text-align: left;
  border-bottom: 1px solid var(--border2);
}
.detail-inner {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.detail-top {
  display: flex;
  align-items: center;
  gap: 14px;
}
.detail-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text3);
}
.detail-tpe {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  color: var(--purple);
}
.detail-chg {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
}
.detail-news-link {
  margin-left: auto;
  font-size: 10px;
  color: var(--blue);
  text-decoration: none;
  border: 1px solid rgba(96,165,250,0.25);
  padding: 2px 8px;
  border-radius: 5px;
  font-family: 'JetBrains Mono', monospace;
}
.detail-news-link:hover { background: var(--blue-bg); }
.detail-cards {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}
.detail-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 7px 8px;
}
.detail-card-label {
  font-size: 9px;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 5px;
  letter-spacing: 0.03em;
}
.detail-card-vals {
  display: flex;
  gap: 6px;
}
.detail-val {
  font-size: 11px;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
}
.detail-val span {
  display: block;
  font-size: 8px;
  font-weight: 400;
  color: var(--text3);
  margin-top: 1px;
}

/* ── Legend ── */
.legend {
  margin-top: 12px;
  font-size: 10px;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}
.legend span { display: flex; align-items: center; gap: 4px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>MARKET SCORE DASHBOARD</h1>
    <div class="subtitle">// 2330 · TPE · KOSPI · TSM · NVDA · NASDAQ · N225</div>
  </div>
  <div class="header-right">
    <div id="status-badge">
      <div id="status-dot" class="loading"></div>
      <span id="status-text">載入中...</span>
    </div>
    <div id="updated-time"></div>
  </div>
</div>

<div id="loading-msg">[ FETCHING DATA... ]</div>

<div id="table-container" style="display:none">
  <div class="table-wrap">
    <table>
      <thead>
        <tr class="gh">
          <th rowspan="2" style="text-align:left;padding-left:14px;width:86px">DATE</th>
          <th colspan="9" class="bl br" style="color:var(--blue)">日盤 DAY SESSION</th>
          <th colspan="2" class="br" style="color:var(--purple)">TPE指數</th>
          <th class="br" style="width:72px">新聞</th>
          <th colspan="12" class="br" style="color:var(--text2)">夜盤 NIGHT SESSION</th>
        </tr>
        <tr class="sh">
          <th class="bl" style="width:38px">r1</th><th style="width:38px">r5</th><th class="br" style="width:38px">r20</th>
          <th style="width:38px">r1</th><th style="width:38px">r5</th><th class="br" style="width:38px">r20</th>
          <th style="width:38px">r1</th><th style="width:38px">r5</th><th class="br" style="width:38px">r20</th>
          <th class="br" style="width:58px;color:var(--purple)">收盤</th>
          <th class="br" style="width:46px;color:var(--purple)">漲跌</th>
          <th class="br" style="width:72px"></th>
          <th style="width:38px">r1</th><th style="width:38px">r5</th><th class="br" style="width:38px">r20</th>
          <th style="width:38px">r1</th><th style="width:38px">r5</th><th class="br" style="width:38px">r20</th>
          <th style="width:38px">r1</th><th style="width:38px">r5</th><th class="br" style="width:38px">r20</th>
          <th style="width:38px">r1</th><th style="width:38px">r5</th><th class="br" style="width:38px">r20</th>
        </tr>
        <tr class="sh" style="border-bottom:1px solid var(--border2)">
          <th style="text-align:left;padding-left:14px"></th>
          <th colspan="3" class="bl br" style="color:var(--blue)">2330</th>
          <th colspan="3" class="br" style="color:var(--blue)">TPE</th>
          <th colspan="3" class="br" style="color:var(--blue)">KOSPI</th>
          <th class="br"></th><th class="br"></th><th class="br"></th>
          <th colspan="3" class="br" style="color:var(--text2)">TSM</th>
          <th colspan="3" class="br" style="color:var(--text2)">NVDA</th>
          <th colspan="3" class="br" style="color:var(--text2)">NASDAQ</th>
          <th colspan="3" class="br" style="color:var(--text2)">N225</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="legend">
    <span><span style="color:var(--bull)">●</span> r值 ≥ 1.5 多方優勢</span>
    <span><span style="color:var(--bear)">●</span> r值 ≤ 0.5 空方優勢</span>
    <span><span style="color:var(--text3)">●</span> 中間地帶</span>
    <span>// 點擊任一列展開細節</span>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz0jTSWTv_lZBVTEZus2y0L9juOxx1alvbY3KTAwHgt0tD08XbENCNznMP5VSjkj7yOHw/exec";

const DAY   = ["2330日分析","TPE日分析","KOSPI日分析"];
const NIGHT = ["tsm日分析","nvda日分析","納斯日分析","N225日分析"];
const LABELS = {"2330日分析":"2330","TPE日分析":"TPE","KOSPI日分析":"KOSPI","tsm日分析":"TSM","nvda日分析":"NVDA","納斯日分析":"NASDAQ","N225日分析":"N225"};

// ── 評分顏色 ──
function vClass(v) {
  if (v === null || v === undefined) return 'v-null';
  if (v >= 1.5) return 'v-bull';
  if (v <= 0.5) return 'v-bear';
  return 'v-neut';
}
function vHtml(v) {
  if (v === null || v === undefined) return '<span class="v-null">—</span>';
  return '<span class="' + vClass(v) + '">' + v + '</span>';
}

// ── 新聞標籤 ──
function newsTag(n) {
  if (!n || !n.direction) return '<span class="tag tag-neut">—</span>';
  var d = n.direction, u = n.url || '';
  // direction 可能是 "🟢 看多" / "🔴 看空" / "⚪ 中立"
  var isBull = d.indexOf('看多') >= 0;
  var isBear = d.indexOf('看空') >= 0;
  var cls = isBull ? 'tag-bull' : isBear ? 'tag-bear' : 'tag-neut';
  if (u && u !== '' && u !== '0') {
    return '<a class="tag ' + cls + '" href="' + u + '" target="_blank" onclick="event.stopPropagation()">' + d + '</a>';
  }
  return '<span class="tag ' + cls + '">' + d + '</span>';
}

// ── TPE 漲跌 ──
function chgHtml(chg) {
  if (chg === null || chg === undefined) return '<span class="v-null">—</span>';
  var cls = chg > 0 ? 'v-bull' : chg < 0 ? 'v-bear' : 'v-neut';
  var prefix = chg > 0 ? '+' : '';
  return '<span class="' + cls + '">' + prefix + chg + '</span>';
}

// ── 渲染 ──
function render(data) {
  var tbody = document.getElementById('tbody');
  var html = '';

  data.rows.forEach(function(row, i) {
    var tp = row.tpe_price || {};

    // — data row —
    html += '<tr class="data-row" onclick="tog(' + i + ')">';
    html += '<td class="date-cell">' + row.date + '</td>';

    // 日盤三檔 r1/r5/r20
    DAY.forEach(function(t, ti) {
      var s = row[t] || {};
      var lBorder = ti === 0 ? ' bl' : '';
      html += '<td class="score-cell' + lBorder + '">' + vHtml(s.r1) + '</td>';
      html += '<td class="score-cell">'   + vHtml(s.r5)  + '</td>';
      html += '<td class="score-cell br">'+ vHtml(s.r20) + '</td>';
    });

    // TPE 收盤 & 漲跌
    var closeStr = (tp.close !== null && tp.close !== undefined) ? tp.close.toLocaleString() : '—';
    html += '<td class="price-cell br" style="color:var(--purple)">' + closeStr + '</td>';
    html += '<td class="price-cell br">' + chgHtml(tp.change) + '</td>';

    // 新聞
    html += '<td class="br" style="padding:0 4px">' + newsTag(row.news) + '</td>';

    // 夜盤四檔 r1/r5/r20
    NIGHT.forEach(function(t) {
      var s = row[t] || {};
      html += '<td class="score-cell bl-s">' + vHtml(s.r1)  + '</td>';
      html += '<td class="score-cell">'      + vHtml(s.r5)  + '</td>';
      html += '<td class="score-cell br">'   + vHtml(s.r20) + '</td>';
    });

    html += '</tr>';

    // — detail row —
    html += '<tr class="detail-row" id="dr' + i + '"><td colspan="25">';
    html += '<div class="detail-inner">';
    html += '<div class="detail-top">';
    html += '<span class="detail-date">' + row.date + '</span>';
    if (tp.close !== null && tp.close !== undefined) {
      html += '<span class="detail-tpe">TPE ' + tp.close.toLocaleString() + '</span>';
      html += '<span class="detail-chg ' + (tp.change > 0 ? 'v-bull' : tp.change < 0 ? 'v-bear' : 'v-neut') + '">' + (tp.change > 0 ? '+' : '') + tp.change + '</span>';
    }
    if (row.news && row.news.url && row.news.url !== '') {
      html += '<a class="detail-news-link" href="' + row.news.url + '" target="_blank" onclick="event.stopPropagation()">↗ 新聞報表</a>';
    }
    html += '</div>';

    html += '<div class="detail-cards">';
    DAY.concat(NIGHT).forEach(function(t) {
      var s = row[t] || {r1:null, r5:null, r20:null};
      html += '<div class="detail-card">';
      html += '<div class="detail-card-label">' + LABELS[t] + '</div>';
      html += '<div class="detail-card-vals">';
      ['r1','r5','r20'].forEach(function(k) {
        var v = s[k];
        var cls = v !== null && v !== undefined ? vClass(v) : 'v-null';
        html += '<div class="detail-val ' + cls + '">' + (v !== null && v !== undefined ? v : '—') + '<span>' + k + '</span></div>';
      });
      html += '</div></div>';
    });
    html += '</div></div></td></tr>';
  });

  tbody.innerHTML = html;

  // 更新狀態
  document.getElementById('status-dot').className = 'ok';
  document.getElementById('status-text').textContent = data.rows.length + ' 天資料';
  if (data.updated) {
    var d = new Date(data.updated);
    document.getElementById('updated-time').textContent =
      '更新：' + d.toLocaleString('zh-TW', {timeZone:'Asia/Taipei', hour12:false});
  }

  document.getElementById('loading-msg').style.display = 'none';
  document.getElementById('table-container').style.display = 'block';
}

function tog(i) {
  var dr = document.getElementById('dr' + i);
  dr.classList.toggle('open');
}

// ── Fetch ──
fetch(API_URL)
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.error) throw new Error(data.error);
    render(data);
  })
  .catch(function(err) {
    document.getElementById('status-dot').className = 'err';
    document.getElementById('status-text').textContent = 'ERROR';
    document.getElementById('loading-msg').textContent = '[ ERROR: ' + err.message + ' ]';
  });
</script>
</body>
</html>
